<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine API-nøgler</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0f11;
    --surface:   #16181c;
    --border:    #2a2d34;
    --accent:    #4f9cf9;
    --danger:    #e05252;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    display: grid;
    place-items: start center;
    padding: 3rem 1rem;
  }

  .shell { width: 100%; max-width: 640px; }

  header {
    margin-bottom: 2.5rem;
    border-left: 2px solid var(--accent);
    padding-left: 1rem;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  header p { margin-top: 0.35rem; font-size: 0.85rem; color: var(--muted); }

  #login-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    text-align: center;
  }

  #login-panel p {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .btn {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 0.6rem 1.1rem;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--accent); color: var(--bg); }

  .btn.danger { border-color: var(--danger); color: var(--danger); padding: 0.35rem 0.7rem; font-size: 0.72rem; }
  .btn.danger:hover { background: var(--danger); color: #fff; }

  .btn.logout { border-color: var(--muted); color: var(--muted); font-size: 0.72rem; padding: 0.35rem 0.7rem; }
  .btn.logout:hover { background: var(--muted); color: var(--bg); }

  #main-panel { display: none; }

  .section-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .add-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .add-form input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 0.6rem 0.75rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-form input:focus { border-color: var(--accent); }
  .add-form input::placeholder { color: var(--muted); }

  .cred-list { display: flex; flex-direction: column; gap: 0.4rem; }

  .cred-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.75rem 1rem;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cred-name { font-family: var(--mono); font-size: 0.85rem; color: var(--text); }
  .cred-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }

  .empty {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: var(--mono);
    padding: 1.5rem 1rem;
    border: 1px dashed var(--border);
    text-align: center;
  }

  #toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.75rem 1.25rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  .status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .status-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #3ecf6e;
    box-shadow: 0 0 6px #3ecf6e88;
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>// mine api-nøgler</h1>
    <p>Administrer dine personlige credentials til MCP-servere</p>
  </header>

  <div id="login-panel">
    <p>Log ind med din organisationskonto for at administrere dine API-nøgler.</p>
    <button class="btn" onclick="oidcLogin()">Log ind med Keycloak</button>
  </div>

  <div id="main-panel">
    <div class="status">
      <div class="status-left">
        <span class="dot"></span>
        <span id="user-label">—</span>
      </div>
      <button class="btn logout" onclick="logout()">Log ud</button>
    </div>

    <p class="section-label">Tilføj nøgle</p>
    <div class="add-form">
      <input id="new-name"  placeholder="Navn  (fx OPENAI_API_KEY)" />
      <input id="new-value" type="password" placeholder="Værdi" />
      <button class="btn" onclick="addCredential()">Gem</button>
    </div>

    <p class="section-label">Gemte nøgler</p>
    <div class="cred-list" id="cred-list">
      <div class="empty">Ingen nøgler endnu</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let KEYCLOAK_URL = null, KEYCLOAK_REALM = null, CLIENT_ID = null;
  let TOKEN = null;
  const REDIRECT_URI = window.location.origin + '/callback';

  async function init() {
    const cfg = await fetch('/config').then(r => r.json());
    KEYCLOAK_URL   = cfg.keycloak_url;
    KEYCLOAK_REALM = cfg.keycloak_realm;
    CLIENT_ID      = cfg.client_id;
    REDIRECT_URI   = cfg.redirect_uri;  // ← hentes fra server i stedet

    const params = new URLSearchParams(window.location.search);
    const stored = sessionStorage.getItem('credentials_token');

    if (params.has('token')) {
      TOKEN = params.get('token');
      sessionStorage.setItem('credentials_token', TOKEN);
      window.history.replaceState({}, '', '/');
      await showMain();
    } else if (stored) {
      TOKEN = stored;
      await showMain();
    }
  }

  function oidcLogin() {
    const url = new URL(`${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth`);
    url.searchParams.set('client_id',     CLIENT_ID);
    url.searchParams.set('redirect_uri',  REDIRECT_URI);
    url.searchParams.set('response_type', 'code');
    url.searchParams.set('scope',         'openid profile');
    window.location.href = url.toString();
  }

  async function showMain() {
    try {
      const creds = await api('GET', '/me/credentials');
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('main-panel').style.display  = 'block';
      try {
        const p = JSON.parse(atob(TOKEN.split('.')[1]));
        document.getElementById('user-label').textContent =
          p.preferred_username || p.email || p.sub;
      } catch {}
      renderList(creds);
    } catch { logout(); }
  }

  function logout() {
    sessionStorage.removeItem('credentials_token');
    TOKEN = null;
    document.getElementById('login-panel').style.display = 'block';
    document.getElementById('main-panel').style.display  = 'none';
  }

  function toast(msg, error = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (error ? ' error' : '');
    setTimeout(() => el.className = '', 2500);
  }

  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    return r.status === 204 ? null : r.json();
  }

  function renderList(creds) {
    const el = document.getElementById('cred-list');
    if (!creds.length) { el.innerHTML = '<div class="empty">Ingen nøgler endnu</div>'; return; }
    el.innerHTML = creds.map(c => `
      <div class="cred-row">
        <div>
          <div class="cred-name">${escHtml(c.key_name)}</div>
          <div class="cred-meta">gemt ${c.created_at.slice(0,16).replace('T',' ')}</div>
        </div>
        <button class="btn danger" onclick="deleteCredential('${escHtml(c.key_name)}')">slet</button>
      </div>
    `).join('');
  }

  async function addCredential() {
    const name  = document.getElementById('new-name').value.trim();
    const value = document.getElementById('new-value').value.trim();
    if (!name || !value) { toast('Udfyld både navn og værdi', true); return; }
    try {
      await api('POST', '/me/credentials', { key_name: name, key_value: value });
      document.getElementById('new-name').value  = '';
      document.getElementById('new-value').value = '';
      toast(`✓ ${name} gemt`);
      renderList(await api('GET', '/me/credentials'));
    } catch (e) { toast(e.message, true); }
  }

  async function deleteCredential(name) {
    try {
      await api('DELETE', `/me/credentials/${encodeURIComponent(name)}`);
      toast(`${name} slettet`);
      renderList(await api('GET', '/me/credentials'));
    } catch (e) { toast(e.message, true); }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
