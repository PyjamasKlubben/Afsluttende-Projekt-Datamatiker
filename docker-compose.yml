services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    volumes:
      - keycloak_data:/opt/keycloak/data
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  agentgateway:
    container_name: agentgateway
    restart: unless-stopped
    image: cr.agentgateway.dev/agentgateway:v1.1.0
    ports:
      - "3000:3000"
      - "127.0.0.1:15000:15000"
    volumes:
      - ./config.yaml:/config.yaml
    environment:
      - ADMIN_ADDR=0.0.0.0:15000
      - OIDC_ISSUER=http://localhost:8080/realms/mcp
      - OIDC_JWKS_URL=http://localhost:8080/realms/mcp/protocol/openid-connect/certs
    command: ["-f", "/config.yaml"]
    depends_on:
      keycloak:
        condition: service_healthy
      mcp-everything:
        condition: service_started

  mcp-everything:
    container_name: mcp-everything
    image: node:22-alpine
    command: npx -y @modelcontextprotocol/server-everything sse
    ports:
      - "3001:3001"

volumes:
  keycloak_data:
