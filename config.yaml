binds:
- port: 3000
  listeners:
  - routes:
    - hostnames: []
      matches:
      - path:
          pathPrefix: /
      backends:
      - mcp:
          targets:
          - name: everything
            mcp:
              host: http://mcp-everything:3001/mcp
          statefulMode: stateful
      policies:
        cors:
          allowOrigins:
          - '*'
          allowHeaders:
          - '*'
          exposeHeaders:
          - Mcp-Session-Id
        mcpAuthentication:
          mode: strict
          issuer: https://auth.petermikkelsen.dk/realms/mcp
          audiences:
          - agentgateway-client
          jwks:
            url: http://keycloak:8080/realms/mcp/protocol/openid-connect/certs
          provider:
            keycloak: {}
          resourceMetadata:
            resource: https://auth.petermikkelsen.dk/mcp
            scopesSupported:
            - profile
            - offline_access
            - openid
            bearerMethodsSupported:
            - header
