binds:
- port: 3000
  listeners:
  - routes:
    - backends:
      - mcp:
          targets:
          - name: everything
            sse:
              host: mcp-everything
              port: 3001
              path: /sse
      policies:
        cors:
          allowOrigins:
          - '*'
          allowHeaders:
          - '*'
          exposeHeaders:
          - Mcp-Session-Id
        mcpAuthentication:
          mode: strict
          issuer: http://keycloak:8080/realms/mcp
          audiences:
          - mcp_proxy
          jwks:
            url: http://keycloak:8080/realms/mcp/protocol/openid-connect/certs
          provider:
            keycloak: {}
          resourceMetadata:
            resource: http://localhost:3000/mcp
            scopesSupported:
            - profile
            - offline_access
            - openid
            bearerMethodsSupported:
            - header
