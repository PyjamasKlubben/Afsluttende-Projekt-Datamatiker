binds:
  - port: 3000
    listeners:
      - routes:
          - hostnames: []
            matches:
              - path:
                  pathPrefix: /
            backends:
              - mcp:
                  targets:
                    - name: utility-tools
                      mcp:
                        host: http://utility-tools:3003/mcp
                    - name: financial-entry-tools
                      mcp:
                        host: http://financial-entry-tools:3002/mcp
                    - name: email-tools
                      mcp:
                        host: http://email-tools:3005/mcp
                    - name: cache-query-tools
                      mcp:
                        host: http://cache-query-tools:3004/mcp
                    - name: n8n-tools
                      mcp:
                        host: http://n8n-tools:3001/mcp
            policies:
              mcpAuthorization:
                rules:
                  - 'mcp.tool.target != "utility-tools" || (has(jwt.roles) && "utility-tools-access" in jwt.roles)'
              timeout:
                requestTimeout: 30s
                backendRequestTimeout: 30s
              cors:
                allowOrigins: ["*"]
                allowHeaders: ["*"]
                exposeHeaders: ["Mcp-Session-Id"]
              requestHeaderModifier:
                add:
                  Accept: "application/json, text/event-stream"
              mcpAuthentication:
                mode: strict
                issuer: https://auth.petermikkelsen.dk/realms/mcp
                audiences:
                  - agentgateway-client
                jwks:
                  url: http://keycloak:8080/realms/mcp/protocol/openid-connect/certs
                provider:
                  keycloak: {}
                resourceMetadata:
                  resource: https://auth.petermikkelsen.dk/mcp
                  scopesSupported:
                    - profile
                    - offline_access
                    - openid
                  bearerMethodsSupported:
                    - header
